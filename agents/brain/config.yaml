# KisanMind Brain - Agent Configuration
# ======================================

orchestrator:
  name: "KisanMind Brain"
  description: "Root orchestrator that coordinates specialist agricultural advisory agents"
  model: "gemini-2.5-pro"
  max_tokens: 4096
  temperature: 0.3

sub_agents:
  sat_drishti:
    name: "SatDrishti"
    description: "Satellite-based crop health monitoring using NDVI/EVI/NDWI indices from Earth Engine"
    model: "gemini-2.0-flash"
    triggers:
      - "crop_health_check"
      - "full_advisory"
    capabilities:
      - "ndvi_analysis"
      - "crop_stress_detection"
      - "growth_stage_assessment"

  mandi_mitra:
    name: "MandiMitra"
    description: "Market intelligence agent for mandi prices, transport logistics, and profit optimization"
    model: "gemini-2.0-flash"
    triggers:
      - "where_to_sell"
      - "full_advisory"
    capabilities:
      - "mandi_price_lookup"
      - "profit_calculation"
      - "transport_route_optimization"

  mausam_guru:
    name: "MausamGuru"
    description: "Weather advisory agent providing forecasts and farming action recommendations"
    model: "gemini-2.0-flash"
    triggers:
      - "weather_advisory"
      - "full_advisory"
    capabilities:
      - "weather_forecast"
      - "frost_alert"
      - "irrigation_scheduling"
      - "spray_window_detection"

  vaani_setu:
    name: "VaaniSetu"
    description: "Voice and language bridge for multilingual farmer interactions"
    model: "gemini-2.0-flash"
    triggers:
      - "all"
    capabilities:
      - "speech_to_text"
      - "text_to_speech"
      - "language_translation"

# Intent routing map
intent_routing:
  crop_health_check:
    agents: ["sat_drishti"]
    parallel: false
    description: "Check crop health using satellite imagery"
  where_to_sell:
    agents: ["mandi_mitra"]
    parallel: false
    description: "Find best mandi to sell produce"
  weather_advisory:
    agents: ["mausam_guru"]
    parallel: false
    description: "Get weather-based farming advisory"
  full_advisory:
    agents: ["sat_drishti", "mandi_mitra", "mausam_guru"]
    parallel: true
    description: "Comprehensive advisory combining all specialist agents"

# Guardrail rules
guardrails:
  prohibited_topics:
    - rule: "no_pesticide_brands"
      description: "Never recommend specific pesticide brand names or dosage amounts"
      response: "Please consult your local Krishi Vigyan Kendra (KVK) or agricultural extension officer for specific pesticide recommendations."
    - rule: "no_loan_advice"
      description: "Never provide loan, credit, or financial investment advice"
      response: "For financial guidance, please contact your nearest bank or NABARD office."
    - rule: "no_yield_guarantees"
      description: "Never guarantee specific crop yields or income amounts"
      response: "Yields depend on many factors. The estimates provided are indicative based on historical data."
  mandatory_disclaimers:
    - "Advisory is based on satellite data, weather models, and market trends. Always verify with local conditions."
    - "Consult your local agricultural extension officer for region-specific guidance."
  data_citation: true
  audit_logging: true

# Supported languages
languages:
  - code: "en"
    name: "English"
  - code: "hi"
    name: "Hindi"
  - code: "pa"
    name: "Punjabi"
  - code: "kn"
    name: "Kannada"
  - code: "ta"
    name: "Tamil"
  - code: "te"
    name: "Telugu"
  - code: "mr"
    name: "Marathi"

# Supported crops
crops:
  cereals:
    - wheat
    - rice
    - maize
    - bajra
    - jowar
  fruits:
    - apple
    - mango
    - banana
    - guava
    - papaya
  vegetables:
    - tomato
    - potato
    - onion
    - cauliflower
    - brinjal
    - chilli
  plantation:
    - coffee
    - tea
    - cardamom
  oilseeds:
    - mustard
    - groundnut
    - soybean
  pulses:
    - chana
    - moong
    - tur
